name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Prepare Gradle Wrapper
        run: |
          if [ ! -f "gradlew" ]; then
            cp gradlew.bat gradlew 2>/dev/null || true
          fi
          chmod +x gradlew

      - name: Build with Gradle
        run: |
          export GRADLE_USER_HOME=~/.gradle
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: MoReader-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
