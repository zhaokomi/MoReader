name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  attestations: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Gradle Wrapper
        run: |
          if [ ! -f "gradlew" ]; then
            cp gradlew.bat gradlew 2>/dev/null || true
          fi
          chmod +x gradlew

      - name: Build with Gradle
        run: |
          export GRADLE_USER_HOME=~/.gradle
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tee build.log

      - name: Show build log on failure
        if: failure()
        run: |
          echo "=== Build Log (last 200 lines) ==="
          tail -200 build.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MoReader-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## 📱 MoReader 墨阅

            Android 电子书阅读器

            ### 新版本功能
            - 全新架构设计
            - 支持多种电子书格式 (TXT, EPUB, MOBI, PDF)
            - 舒适的阅读体验

            ### 安装说明
            1. 下载下面的 APK 文件
            2. 在手机上安装（可能需要开启"未知来源"权限）
            3. 享受阅读！

            ---
            *此版本由 GitHub Actions 自动构建*
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
